services:
  postgres:
    image: postgres:16-alpine
    container_name: ccms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ccms
      POSTGRES_USER: ccms
      POSTGRES_PASSWORD: ccms_dev_password
    ports:
      - "5432:5432"
    volumes:
      - ccms-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccms -d ccms"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ccms-postgres-data:
